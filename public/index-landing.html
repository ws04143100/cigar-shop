<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>雪茄精品館</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(to bottom, #fffbeb, #fff7ed);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 320px;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #d97706, #ea580c);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .logo svg {
      width: 48px;
      height: 48px;
      fill: white;
    }
    h1 {
      font-size: 24px;
      color: #1f2937;
      margin-bottom: 8px;
    }
    p {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #d97706, #ea580c);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 16px;
      text-decoration: none;
    }
    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
    }
    .tip {
      margin-top: 24px;
      padding: 16px;
      background: #fef3c7;
      border-radius: 8px;
      font-size: 13px;
      color: #92400e;
      text-align: left;
    }
    .tip-title {
      font-weight: 600;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"/>
      </svg>
    </div>
    
    <h1>雪茄精品館</h1>
    <p>專業雪茄零售批發，優質產品等你選購</p>
    
    <a href="https://sanluisvip.coze.site/home" class="btn" id="enterBtn">
      進入商城
    </a>
    
    <button class="btn btn-secondary" onclick="copyLink()">
      複製連結分享
    </button>
    
    <div class="tip">
      <div class="tip-title">💡 微信用戶提示：</div>
      如無法正常開啟，請點擊右上角「···」選擇「在瀏覽器中打開」
    </div>
  </div>

  <script>
    // 复制链接功能
    function copyLink() {
      const url = 'https://sanluisvip.coze.site/home';
      if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(function() {
          alert('連結已複製！');
        });
      } else {
        // 兼容旧浏览器
        const input = document.createElement('input');
        input.value = url;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        alert('連結已複製！');
      }
    }
    
    // 检测微信环境
    var ua = navigator.userAgent.toLowerCase();
    var isWeChat = ua.indexOf('micromessenger') !== -1;
    
    if (isWeChat) {
      document.getElementById('enterBtn').addEventListener('click', function(e) {
        e.preventDefault();
        alert('請點擊右上角「···」→「在瀏覽器中打開」\n或選擇「複製連結」後用瀏覽器打開');
      });
    }
  </script>
</body>
</html>
